<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkin</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#1a1d27" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Checkin" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon-180.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117; color: #e2e8f0; font-size: 16px; min-height: 100vh;
      padding-bottom: calc(4.5rem + env(safe-area-inset-bottom));
    }
    .mh {
      position: sticky; top: 0; z-index: 100;
      background: #1a1d27; border-bottom: 1px solid #2d3148;
      padding: 0.85rem 1rem;
      padding-top: max(0.85rem, env(safe-area-inset-top));
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .mh-left { display: flex; align-items: center; gap: 0.6rem; }
    .mh h1 { font-size: 1rem; font-weight: 600; color: #7c86ff; }
    .mh-btn {
      background: none; border: 1px solid #2d3148; color: #94a3b8;
      padding: 0 0.85rem; border-radius: 8px; font-size: 0.82rem; cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.3rem; height: 38px;
    }
    .mh-btn:active { background: #2d3148; }
    .cnt { font-size: 0.75rem; color: #475569; }

    main { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.6rem; }

    .dot {
      width: 9px; height: 9px; border-radius: 50%; background: #ef4444; flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.on { background: #22c55e; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .ev-card {
      background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px;
      display: flex; gap: 0.75rem; padding: 0.75rem; align-items: flex-start;
    }
    .ev-card.new-ev { border-color: #7c86ff55; }
    .ev-thumb {
      width: 60px; height: 60px; border-radius: 8px;
      background: #0f1117; border: 1px solid #2d3148; flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      color: #475569; font-size: 0.6rem;
    }
    .ev-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .ev-info { flex: 1; min-width: 0; }
    .ev-track { font-size: 0.9rem; font-weight: 700; font-family: monospace; color: #e2e8f0; }
    .ev-cam { font-size: 0.78rem; color: #94a3b8; margin-top: 0.2rem; }
    .ev-score {
      display: inline-block; font-size: 0.72rem; font-weight: 700; color: #22c55e;
      background: #22c55e18; border: 1px solid #22c55e33; border-radius: 4px;
      padding: 0.1rem 0.4rem; margin-top: 0.25rem;
    }
    .ev-time { font-size: 0.7rem; color: #475569; margin-top: 0.25rem; }

    .empty { text-align: center; color: #475569; padding: 4rem 1rem; font-size: 0.9rem; }

    /* Bottom nav */
    .bn {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a1d27; border-top: 1px solid #2d3148;
      display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 200;
    }
    .bn a {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 0.5rem 0; text-decoration: none; color: #475569;
      font-size: 0.58rem; gap: 0.15rem; min-height: 52px; justify-content: center;
    }
    .bn a.act { color: #7c86ff; }
    .bn a:active { color: #7c86ff; }
    .bn .ico { font-size: 1.25rem; line-height: 1; }
  </style>
</head>
<body>

<div class="mh">
  <div class="mh-left">
    <div class="dot" id="sdot"></div>
    <h1>Checkin</h1>
  </div>
  <div style="display:flex;align-items:center;gap:0.5rem;">
    <span class="cnt" id="cnt"></span>
    <button class="mh-btn" onclick="clearEvs()">Limpar</button>
  </div>
</div>

<main id="feed">
  <div class="empty" id="empty">Aguardando detecções…</div>
</main>

<nav class="bn">
  <a href="/camera300/m/" class="act">
    <span class="ico">◉</span><span>Checkin</span>
  </a>
  <a href="/camera300/m/tracks/lista">
    <span class="ico">☰</span><span>Lista</span>
  </a>
  <a href="/camera300/m/tracks/tabuleiro">
    <span class="ico">⊞</span><span>Tabuleiro</span>
  </a>
  <a href="/camera300/m/tracks/caixa">
    <span class="ico">⊙</span><span>Caixa</span>
  </a>
  <a href="/camera300/m/tracks/quadro">
    <span class="ico">◫</span><span>Quadro</span>
  </a>
</nav>

<script>
  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty');
  const sdot = document.getElementById('sdot');
  const cntEl = document.getElementById('cnt');
  let total = 0, es, timer;

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function fmtTime(v) {
    if (!v) return '';
    const d = new Date(v);
    if (isNaN(d)) return String(v);
    return d.toLocaleTimeString('pt-BR');
  }

  function addCard(ev, prepend) {
    empty.style.display = 'none';
    total++;
    cntEl.textContent = total + ' evento' + (total !== 1 ? 's' : '');

    const d = ev.payload?.data || ev.payload || {};
    const trackId = d['track-id'] ?? d.track_id ?? null;
    const cameraId = d.camera_id ?? null;
    const time = fmtTime(ev.received_at);
    const uid = 'ev-' + Date.now() + '-' + Math.random().toString(36).slice(2);

    const div = document.createElement('div');
    div.className = 'ev-card' + (prepend ? ' new-ev' : '');
    div.innerHTML = `
      <div class="ev-thumb" id="${uid}-th">…</div>
      <div class="ev-info">
        <div class="ev-track">${esc(String(trackId ?? '—'))}</div>
        <div class="ev-cam" id="${uid}-cam">Câmera ${cameraId !== null ? esc(cameraId) : '…'}</div>
        <div id="${uid}-sc"></div>
        <div class="ev-time">${esc(time)}</div>
      </div>`;

    if (prepend) feed.prepend(div); else feed.append(div);

    if (trackId) {
      fetch(`/camera300/api/track_image/${encodeURIComponent(trackId)}`)
        .then(r => r.json())
        .then(resp => {
          const th = document.getElementById(`${uid}-th`);
          const camEl = document.getElementById(`${uid}-cam`);
          const scEl = document.getElementById(`${uid}-sc`);
          if (th) th.innerHTML = resp.image_url
            ? `<img src="${esc(resp.image_url)}" alt="" onerror="this.parentElement.textContent='N/A'">`
            : 'N/A';
          if (camEl && resp.camera_id != null)
            camEl.textContent = 'Câmera ' + resp.camera_id;
          if (scEl && resp.face_det_score != null)
            scEl.innerHTML = `<span class="ev-score">${(resp.face_det_score * 100).toFixed(1)}%</span>`;
        })
        .catch(() => {
          const th = document.getElementById(`${uid}-th`);
          if (th) th.textContent = 'Err';
        });
    }
  }

  function connect() {
    if (es) es.close();
    es = new EventSource('/camera300/stream');
    es.onopen = () => { sdot.classList.add('on'); clearTimeout(timer); };
    es.onerror = () => {
      sdot.classList.remove('on');
      es.close();
      timer = setTimeout(connect, 3000);
    };
    es.onmessage = e => {
      if (!e.data || e.data === 'ping') return;
      try {
        const ev = JSON.parse(e.data);
        if (ev.type === 'trace') return;
        addCard(ev, total > 0 || feed.querySelectorAll('.ev-card').length > 0);
      } catch(_) {}
    };
  }

  function clearEvs() {
    fetch('/camera300/clear', { method: 'POST' }).then(() => {
      feed.querySelectorAll('.ev-card').forEach(c => c.remove());
      empty.style.display = '';
      total = 0; cntEl.textContent = '';
    });
  }

  connect();
</script>
</body>
</html>
